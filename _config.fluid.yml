#---------------------------
# Hexo Theme Fluid
# 主题配置文件
#---------------------------

# 全局配置
navbar:
  blog_title: "Java 面试知识库"
  menu:
    - { key: "home", link: "/", icon: "iconfont icon-home-fill" }
    - { key: "archive", link: "/archives/", icon: "iconfont icon-archive-fill" }
    - { key: "category", link: "/categories/", icon: "iconfont icon-category-fill" }
    - { key: "tag", link: "/tags/", icon: "iconfont icon-tags-fill" }
    - { key: "about", link: "/about/", icon: "iconfont icon-user-fill" }

# 首页
index:
  banner_img: "https://fluid-dev.github.io/hexo-fluid-docs/img/cover.png"
  banner_img_height: 60
  banner_mask_alpha: 0.3
  slogan:
    enable: true
    text: "系统化的 Java 后端技术面试指南"
  post_default_img: ""
  post_url_target: _self
  post_meta:
    date: true
    category: true
    tag: false

# 文章页
post:
  banner_img: ""
  banner_img_height: 45
  banner_mask_alpha: 0.3
  meta:
    author:
      enable: false
    date:
      enable: true
      format: "dddd, MMMM Do YYYY, h:mm a"
    wordcount:
      enable: true
      format: "{} 字"
    min2read:
      enable: true
      format: "{} 分钟"
    views:
      enable: false
  # 文章目录
  toc:
    enable: true
    headingSelector: "h1,h2,h3,h4,h5,h6"
    collapseDepth: 0
  # 代码块
  code:
    copy_btn: true
    highlight:
      enable: true
      line_number: true
      lib: "highlightjs"
      highlightjs:
        style: "github"
        bg_color: false
      prismjs:
        style: "default"
        preprocess: true

# 分类页
category:
  enable: true
  banner_img: ""
  banner_img_height: 45
  banner_mask_alpha: 0.3

# 标签页
tag:
  enable: true
  banner_img: ""
  banner_img_height: 45
  banner_mask_alpha: 0.3

# 归档页
archive:
  banner_img: ""
  banner_img_height: 45
  banner_mask_alpha: 0.3

# 关于页
about:
  enable: true
  banner_img: ""
  banner_img_height: 45
  banner_mask_alpha: 0.3
  avatar: ""
  name: "b1tzer"
  intro: "Java 后端开发工程师"

# 页脚
footer:
  statistics:
    enable: true
  content: '<a href="https://github.com/b1tzer/java-interview" target="_blank">GitHub</a>'
