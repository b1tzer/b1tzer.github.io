backend:
  name: git-gateway
  branch: main

# 媒体库配置
media_folder: "docs/images"
public_folder: "/images"

# 发布功能配置
publish_mode: editorial_workflow # 草稿 → 待审 → 发布流程

# CMS 显示配置
site_url: https://tstack.netlify.app
display_url: https://tstack.netlify.app
logo_url: https://github.com/b1tzer.png

# 集合配置
collections:
  - name: "java-basic"
    label: "☕ Java 基础"
    folder: "docs/01-java-basic"
    create: true
    extension: "md"
    format: "frontmatter"
    slug: "{{slug}}"
    fields:
      - label: "标题"
        name: "title"
        widget: "string"
        required: true
      - label: "内容"
        name: "body"
        widget: "markdown"
        modes: ["rich_text", "raw"]

  - name: "spring"
    label: "🍃 Spring 框架"
