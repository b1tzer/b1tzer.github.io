{% extends "main.html" %}

{% block tabs %}
  {{ super() }}
  <style>
    /* 首页隐藏 header 固定定位、两侧边栏、正文内容区 */
    .md-header { position: initial }
    .md-main__inner { margin: 0 }
    .md-content { display: none }
    @media screen and (min-width: 60em) { .md-sidebar--secondary { display: none } }
    @media screen and (min-width: 76.25em) { .md-sidebar--primary { display: none } }

    /* ── 首页外层容器：全宽 ── */
    .home-container {
      width: 100%;
      padding-bottom: 3rem;
    }

    /* ── 内容宽度约束区（默认与 .md-grid 保持一致，宽屏由 extra.css 覆盖） ── */
    .home-inner {
      max-width: 61rem;
      margin: 2rem auto 0;
      padding: 0 1.5rem;
    }

    /* ── Hero 区域 ── */
    .hero-section {
      text-align: center;
      padding: 3rem 1rem 3.5rem;
      margin: 0 0 2rem;
      /* 多色渐变，配合 extra.css 的 background-size:200% 200% 实现流动效果 */
      background: linear-gradient(135deg, #4f46e5 0%, #6366f1 30%, #818cf8 60%, #a78bfa 100%);
      color: #fff;
    }

    [data-md-color-scheme="slate"] .hero-section {
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 30%, #4338ca 60%, #6366f1 100%);
    }

    .hero-section h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 0.6rem;
      color: #fff;
      letter-spacing: -0.02em;
    }

    .hero-section p {
      font-size: 1rem;
      opacity: 0.9;
      margin-bottom: 1.5rem;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
    }

    .hero-cta {
      display: inline-block;
      padding: 0.75rem 1.8rem;
      background: rgba(255, 255, 255, 0.2);
      color: #fff !important;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.95rem;
      text-decoration: none !important;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      transition: background 200ms ease, border-color 200ms ease;
    }

    .hero-cta:hover {
      background: rgba(255, 255, 255, 0.32);
      border-color: rgba(255, 255, 255, 0.55);
    }

    /* ── 卡片网格 ── */
    .section-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin: 0 0 1rem;
      color: var(--md-default-fg-color);
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(245px, 1fr));
      gap: 0.75rem;
      margin: 0 0 1rem;
    }

    .card {
      background: var(--md-default-bg-color);
      border: 1px solid var(--md-default-fg-color--lightest);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      text-decoration: none !important;
      color: inherit !important;
      display: flex;
      flex-direction: column;
      /* 强制撑满 Grid 单元格，确保同行等高 */
      align-self: stretch;
      height: 100%;
      box-sizing: border-box;
    }

    .card-icon {
      font-size: 1.3rem;
      margin-bottom: 0.3rem;
      display: block;
    }

    .card-title {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 0.25rem;
      display: block;
    }

    .card-desc {
      font-size: 0.8rem;
      color: var(--md-default-fg-color--light);
      line-height: 1.45;
      margin-bottom: 0.4rem;
      flex: 1;
      display: block;
    }

    .card-count {
      font-size: 0.75rem;
      color: var(--md-primary-fg-color);
      font-weight: 500;
      display: block;
    }

    /* ── 移动端响应式 ── */
    @media (max-width: 768px) {
      .hero-section { padding: 2rem 0.8rem 1.8rem; }
      .hero-section h1 { font-size: 1.6rem; }
      .hero-section p { font-size: 0.9rem; }
      .card-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 480px) {
      .card-grid { grid-template-columns: 1fr; }
    }
  </style>

  <div class="home-container md-typeset">

    <!-- Hero 区域（全宽） -->
    <div class="hero-section">
      <h1>The Stack</h1>
      <p>{{ config.site_description }}</p>
      <a href="{{ '01-java-basic/00-Java基础与JVM概览/' | url }}" class="hero-cta">
        开始阅读 →
      </a>
    </div>

    <!-- 技术领域卡片（由 gen_nav.py 生成，从 index.md 内容读取） -->
    <div class="home-inner">
      {{ page.content }}
    </div><!-- /.home-inner -->

  </div><!-- /.home-container -->
{% endblock %}

{% block content %}{% endblock %}
{% block footer %}{% endblock %}
