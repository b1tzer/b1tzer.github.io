{% extends "base.html" %}

{% block content %}
{# 在文章内容顶部增加一个 CMS 编辑入口 #}
<nav class="md-content__inner md-typeset" style="text-align: right; margin-bottom: -2em;">
    <a href="" id="decap-cms-edit-btn" title="在 CMS 中编辑" class="md-content__button md-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path
                d="M10 20H6V4h7v5h5v3.1l2-2V8l-6-6H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h4v-2m10.2-7c.1 0 .3.1.4.2l1.2 1.2c.2.2.2.6 0 .8l-1 1-2.1-2.1 1-1c.1-.1.3-.1.5-.1m-1.5 2.1 2.1 2.1L15 22.9H13v-2l5.7-5.8Z" />
        </svg>
        <span style="font-size: 0.7rem; vertical-align: middle;">CMS Edit</span>
    </a>
</nav>

{{ super() }}

<script>
    document.addEventListener("DOMContentLoaded", function () {
        // 1. 获取当前页面相对于 docs 的路径
        // 例如：posts/guide.md
        const relPath = "{{ page.file.src_uri }}";

        // 2. 配置你的 Collection 名称 (需对应 Decap CMS 的 config.yml)
        const collection = "posts";

        // 3. 提取文件名（不含扩展名）
        const entryName = relPath.split('/').pop().replace('.md', '');

        // 4. 拼接 Decap CMS 的 URL
        // 假设你的 CMS 后台在 /admin/
        const cmsUrl = window.location.origin + "/admin/#/collections/" + collection + "/entries/" + entryName;

        const editBtn = document.getElementById('decap-cms-edit-btn');
        if (editBtn) {
            editBtn.href = cmsUrl;
        }
    });
</script>
{% endblock %}
