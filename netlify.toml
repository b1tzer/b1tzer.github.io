[build]
# 构建命令：安装依赖 → 生成 docs → 构建静态站点
command = "pip install -r requirements.txt && python3 tools/gen_nav.py && mkdocs build"

# 发布目录（构建输出）
publish = "site"

# 构建环境变量
PYTHON_VERSION = "3.11"
# Python 无缓冲输出，便于日志查看
PYTHONUNBUFFERED = "1"
[build.environment]
GIT_DEFAULT_BRANCH = "main"

# HTTP 安全头配置
[[headers]]
for = "/*"

[headers.values]
X-Content-Type-Options = "nosniff"
X-Frame-Options = "SAMEORIGIN"
X-XSS-Protection = "1; mode=block"

# 静态资源缓存（长期缓存）
[[headers]]
for = "/images/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# 构建上下文配置（分支特定构建）
[context.main]
command = "pip install -r requirements.txt && python3 tools/gen_nav.py && mkdocs build"

[context.main.environment]
SITE_URL = "https://tech.xpro.wang"

# 预发布环境（PR preview）
[context.deploy-preview]
command = "pip install -r requirements.txt && python3 tools/gen_nav.py && mkdocs build"
