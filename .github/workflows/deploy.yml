name: 🚀 Deploy MkDocs to GitHub Pages

on:
  schedule:
    - cron: '7 1 * * *'
  push:
    branches:
      - main # 在 main 分支有推送时触发（blog 合入 main 后触发）
    paths-ignore:
      - ".github/**"   # 忽略 CI 配置本身的变更
      - "docs/index.md" # 忽略自动生成的首页回写，避免循环触发
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      # 2. 设置 Python 环境
      - name: Setup Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      # 3. 安装 MkDocs 及依赖
      - name: Install MkDocs dependencies
        run: pip install -r requirements.txt

      # 4. 同步文章到 docs/ 目录并生成导航
      - name: Sync docs and generate nav
        run: python3 tools/gen_nav.py

      # 5. 将自动生成的文件回写到 main 分支（保持仓库与实际构建一致）
      - name: Commit generated files back to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mkdocs.yml docs/index.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-update nav and index [skip ci]"
            git push origin main
          fi

      # 6. 构建静态站点
      - name: Build MkDocs site
        env:
          MKDOCS_GIT_COMMITTERS_APIKEY: ${{ secrets.GITHUB_TOKEN }}
        run: mkdocs build --strict

      # 7.补充自定义域名
      - name: Add CNAME for custom domain
        run: echo "thestack.xpro.wang" > site/CNAME

      # 8. 部署到 GitHub Pages (使用 gh-pages 分支)
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./site
          commit_message: "deploy: ${{ github.event.head_commit.message }}"
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
