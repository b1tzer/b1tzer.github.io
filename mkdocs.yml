site_name: Java 面试指南 | Java Interview Guide
site_description: 一份系统化的 Java 后端面试知识库，覆盖核心基础、框架原理、数据库、缓存、消息队列、搜索引擎、设计模式与软件工程
site_author: b1tzer
site_url: https://b1tzer.github.io/

repo_name: java-interview-guide
repo_url: https://github.com/b1tzer/java-interview-guide
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: zh
  palette:
    scheme: default
    primary: white
    accent: indigo
  features:
    - navigation.top           # 返回顶部按钮
    - search.highlight         # 搜索高亮
    - content.code.copy        # 代码复制按钮

extra:
  analytics:
    provider: google
    property: G-ZV6SVQFCWW  # 替换为你的 Google Analytics 跟踪 ID
    feedback:
      title: 你觉得这篇文章有帮助吗？
      ratings:
        - icon: material/emoticon-happy-outline
          name: 有帮助
          data: 1
          note: 感谢你的反馈！
        - icon: material/emoticon-sad-outline
          name: 没用
          data: 0
          note: 我们会努力改进。
plugins:
  # - awesome-pages:
  #     filename: .pages
  #     sort_type: natural  # 自然排序，支持数字前缀
  - search:
      lang: zh

markdown_extensions:
  - admonition                 # 提示框（note/warning/tip 等）
  - pymdownx.details           # 折叠块
  - pymdownx.superfences:      # 代码围栏（支持 mermaid）
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:        # 代码高亮
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite      # 行内代码高亮
  - pymdownx.tabbed:           # 标签页
      alternate_style: true
  - pymdownx.tasklist:         # 任务列表
      custom_checkbox: true
  - tables                     # 表格
  - toc:                       # 目录
      permalink: true
      title: 本页目录

