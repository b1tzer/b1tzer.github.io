site_name: The Stack
site_description: 系统化的 Java 后端技术分析，覆盖核心基础、框架原理、数据库、缓存、消息队列、搜索引擎、设计模式与软件工程
site_author: b1tzer
site_url: https://thestack.xpro.wang/

repo_name: b1tzer.github.io
repo_url: https://github.com/b1tzer/b1tzer.github.io

edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  custom_dir: overrides
  language: zh
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/link
        name: 切换到浅色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch-off
        name: 切换到跟随系统
  font: false
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  features:
    - navigation.top           # 返回顶部按钮
    - navigation.instant       # XHR 页面加载，避免全页刷新
    - navigation.instant.progress  # 显示页面加载进度条
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.tracking
    - search.highlight         # 搜索高亮
    - search.suggest
    - search.share
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy        # 代码复制按钮
    - content.tooltips
    - toc.follow

copyright: Copyright &copy; 2024 - 2026 b1tzer

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/b1tzer/b1tzer.github.io
      name: GitHub
  analytics:
    provider: google
    property: G-ZV6SVQFCWW
    feedback:
      title: 你觉得这篇文章有帮助吗？
      ratings:
        - icon: material/emoticon-happy-outline
          name: 有帮助
          data: 1
          note: 感谢你的反馈！
        - icon: material/emoticon-sad-outline
          name: 没用
          data: 0
          note: 我们会努力改进。

# 自定义CSS文件
extra_css:
  - assets/stylesheets/extra.css
  - assets/stylesheets/home.css

# 自定义JavaScript文件
extra_javascript:
  - assets/javascripts/mermaid.mjs
  - assets/javascripts/custom.js

plugins:
  - search:
      lang: zh
      separator: '[\s\u200b\-\.]+'
      jieba_dict_user: docs/assets/jieba/user_dict.txt
  - awesome-pages
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true 
  - git-revision-date-localized:
      type: timeago
      locale: zh
      enable_creation_date: true
      fallback_to_build_date: true
  - glightbox
  - git-committers:
      repository: b1tzer/b1tzer.github.io
      branch: main
      enabled: !ENV [CI, false]   # 本地构建跳过，只在 CI 执行
  - kroki:
      server_url: https://kroki.io
      file_types:
        - svg
      file_type_overrides:
        mermaid: png   # mermaid 继续走前端渲染，不交给 kroki
      enable_block_diag: false
      enable_mermaid: false   # 关闭 kroki 对 mermaid 的接管，保留现有 mermaid.mjs 配置
      http_method: GET
      fail_fast: !ENV [CI, false]

hooks:
  - hooks/gen_index.py
  - hooks/resolve_refs.py
  - hooks/inject_plantuml_style.py

markdown_extensions:
  - attr_list                  # 属性列表（{ .class #id } 语法）
  - md_in_html                 # 允许 HTML 标签内渲染 Markdown
  - pymdownx.emoji:            # emoji 与 Material 图标支持
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition                 # 提示框（note/warning/tip 等）
  - pymdownx.details           # 折叠块
  - pymdownx.superfences:      # 代码围栏（支持 mermaid）
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:        # 代码高亮
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite      # 行内代码高亮
  - pymdownx.tabbed:           # 标签页
      alternate_style: true
  - pymdownx.tasklist:         # 任务列表
      custom_checkbox: true
  - tables                     # 表格
  - toc:                       # 目录
      permalink: true
      title: 本页目录
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower

